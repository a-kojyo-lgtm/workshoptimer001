<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイマー</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --border: #2a2a30;
    --text: #e8e8ec;
    --muted: #6b6b78;
    --accent: #c8f064;
    --accent-dim: rgba(200, 240, 100, 0.12);
    --warn: #f0a030;
    --warn-dim: rgba(240, 160, 48, 0.12);
    --danger: #f05050;
    --danger-dim: rgba(240, 80, 80, 0.15);
    --mono: 'DM Mono', monospace;
    --sans: 'Zen Kaku Gothic New', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(200,240,100,0.06) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.8s ease;
    border-radius: 50%;
  }
  body.warn-mode::before { background: radial-gradient(circle, rgba(240,160,48,0.10) 0%, transparent 70%); }
  body.danger-mode::before { background: radial-gradient(circle, rgba(240,80,80,0.14) 0%, transparent 70%); }
  body.done-mode::before { background: radial-gradient(circle, rgba(240,80,80,0.20) 0%, transparent 60%); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 56px 44px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    position: relative;
  }

  /* ring progress */
  .ring-wrap {
    position: relative;
    width: 200px;
    height: 200px;
  }
  .ring-svg {
    transform: rotate(-90deg);
    position: absolute;
    inset: 0;
  }
  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }
  .ring-prog {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 565.48; /* 2π×90 */
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease;
  }
  body.warn-mode .ring-prog   { stroke: var(--warn); }
  body.danger-mode .ring-prog { stroke: var(--danger); }
  body.done-mode .ring-prog   { stroke: var(--danger); }

  .time-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-text {
    font-family: var(--mono);
    font-size: clamp(2.6rem, 8vw, 3.2rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--text);
    transition: color 0.5s ease;
    line-height: 1;
  }
  body.warn-mode   .time-text { color: var(--warn); }
  body.danger-mode .time-text { color: var(--danger); }
  body.done-mode   .time-text { color: var(--danger); }

  .time-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* pulse on danger */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  body.danger-mode .time-text { animation: pulse 1s ease-in-out infinite; }
  body.done-mode   .time-text { animation: pulse 0.5s ease-in-out infinite; }

  /* presets */
  .presets {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .preset-btn {
    flex: 1;
    padding: 10px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* controls */
  .controls {
    display: flex;
    gap: 12px;
    width: 100%;
  }
  .btn {
    flex: 1;
    padding: 13px 0;
    border-radius: 12px;
    border: none;
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.05em;
  }
  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: var(--accent);
    color: #0e0e10;
    flex: 2;
  }
  .btn-start:hover { filter: brightness(1.1); }
  body.warn-mode   .btn-start { background: var(--warn); }
  body.danger-mode .btn-start { background: var(--danger); color: #fff; }
  body.done-mode   .btn-start { background: var(--danger); color: #fff; }

  .btn-reset {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* status */
  .status {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    height: 16px;
    transition: color 0.3s;
  }
  .status.active { color: var(--accent); }
  body.warn-mode   .status.active { color: var(--warn); }
  body.danger-mode .status.active { color: var(--danger); }
  body.done-mode   .status        { color: var(--danger); }
</style>
</head>
<body>

<div class="card">
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-track" cx="100" cy="100" r="90"/>
      <circle class="ring-prog" id="ringProg" cx="100" cy="100" r="90"/>
    </svg>
    <div class="time-display">
      <div class="time-text" id="timeDisplay">00:00</div>
      <div class="time-label" id="timeLabel">準備完了</div>
    </div>
  </div>

  <div class="presets">
    <button class="preset-btn" data-sec="60">1分</button>
    <button class="preset-btn" data-sec="180">3分</button>
    <button class="preset-btn" data-sec="300">5分</button>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="startBtn">スタート</button>
    <button class="btn btn-reset" id="resetBtn">リセット</button>
  </div>

  <div class="status" id="status">プリセットを選択</div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 90; // 565.48

  let totalSec = 0;
  let remaining = 0;
  let running = false;
  let interval = null;
  let activePreset = null;

  const display  = document.getElementById('timeDisplay');
  const label    = document.getElementById('timeLabel');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const ring     = document.getElementById('ringProg');
  const statusEl = document.getElementById('status');
  const presets  = document.querySelectorAll('.preset-btn');
  const body     = document.body;

  // AudioContext beep
  function beep(freq = 880, dur = 0.15, vol = 0.4) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  function beepDone() {
    [880, 1100, 1320].forEach((f, i) => {
      setTimeout(() => beep(f, 0.25, 0.5), i * 200);
    });
  }

  function fmt(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function updateRing() {
    const ratio = totalSec > 0 ? remaining / totalSec : 0;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);
  }

  function setMode() {
    body.classList.remove('warn-mode', 'danger-mode', 'done-mode');
    if (!running && remaining === 0 && totalSec > 0) {
      body.classList.add('done-mode');
    } else if (remaining <= 10 && remaining > 0) {
      body.classList.add('danger-mode');
    } else if (remaining <= 30 && remaining > 0) {
      body.classList.add('warn-mode');
    }
  }

  function updateUI() {
    display.textContent = fmt(remaining);
    updateRing();
    setMode();
    if (running) {
      startBtn.textContent = '一時停止';
      statusEl.textContent = '計測中…';
      statusEl.classList.add('active');
      label.textContent = '残り時間';
    } else if (remaining === 0 && totalSec > 0) {
      startBtn.textContent = 'スタート';
      statusEl.textContent = '完了！';
      statusEl.classList.add('active');
      label.textContent = '終了';
    } else {
      startBtn.textContent = 'スタート';
      statusEl.textContent = remaining > 0 ? '一時停止中' : 'プリセットを選択';
      statusEl.classList.remove('active');
      label.textContent = remaining > 0 ? '残り時間' : '準備完了';
    }
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      remaining = 0;
      beepDone();
      updateUI();
      return;
    }
    remaining--;
    if (remaining === 10) beep(660, 0.1, 0.3);
    updateUI();
  }

  function startPause() {
    if (totalSec === 0) return;
    if (remaining === 0 && !running) return; // done state
    if (running) {
      clearInterval(interval);
      running = false;
    } else {
      if (remaining === 0) return;
      running = true;
      interval = setInterval(tick, 1000);
      beep(660, 0.08, 0.2);
    }
    updateUI();
  }

  function reset() {
    clearInterval(interval);
    running = false;
    remaining = totalSec;
    body.classList.remove('warn-mode', 'danger-mode', 'done-mode');
    updateUI();
  }

  presets.forEach(btn => {
    btn.addEventListener('click', () => {
      clearInterval(interval);
      running = false;
      totalSec = parseInt(btn.dataset.sec);
      remaining = totalSec;
      presets.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activePreset = btn;
      body.classList.remove('warn-mode', 'danger-mode', 'done-mode');
      updateUI();
      beep(550, 0.08, 0.2);
    });
  });

  startBtn.addEventListener('click', startPause);
  resetBtn.addEventListener('click', reset);

  updateUI();
</script>
</body>
</html>
